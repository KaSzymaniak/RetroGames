<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saper - Retro Arcade</title>
    <link rel="stylesheet" href="saper.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="page-wrap">
        <a href="../../frontend/index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Wróć do Lobby
        </a>

        <div class="player-badge" id="player-badge">
            <span class="badge-avatar" id="badge-avatar">👾</span>
            <span class="badge-name" id="badge-name">Anonim</span>
        </div>

        <!-- Okno w stylu Windows XP -->
        <div class="win-window" id="win-window" data-theme="dark">
            <div class="win-titlebar">
                <span class="win-titlebar-icon">💣</span>
                <span class="win-titlebar-text">Saper</span>
            </div>

            <div class="win-menubar">
                <div class="win-menu">
                    <button class="win-menu-btn" id="menu-gra">Gra</button>
                    <div class="win-dropdown" id="dropdown-gra">
                        <button data-diff="beginner">Początkujący (9×9)</button>
                        <button data-diff="intermediate">Średni (16×16)</button>
                        <button data-diff="expert">Ekspert (30×16)</button>
                        <hr>
                        <button id="menu-new-game">Nowa gra</button>
                    </div>
                </div>
                <div class="win-menu">
                    <button class="win-menu-btn" id="menu-opcje">Opcje</button>
                    <div class="win-dropdown" id="dropdown-opcje">
                        <button data-theme="light"><i class="fa-solid fa-sun"></i> Motyw jasny</button>
                        <button data-theme="dark"><i class="fa-solid fa-moon"></i> Motyw ciemny</button>
                    </div>
                </div>
            </div>

            <div class="win-body">
                <div class="win-statusbar">
                    <div class="led-display" id="mine-counter">010</div>
                    <button class="face-btn" id="face-btn" title="Nowa gra">🙂</button>
                    <div class="led-display" id="timer">000</div>
                </div>

                <div class="board-frame">
                    <div class="board-grid" id="board-grid"></div>
                </div>

                <div class="win-footer">
                    <span id="status-text">Kliknij pole, aby rozpocząć.</span>
                    <span id="diff-label">Początkujący</span>
                </div>
            </div>
        </div>

        <p id="score-msg" class="score-msg"></p>
    </div>

    <script type="module" src="saper.js"></script>
</body>
</html>
